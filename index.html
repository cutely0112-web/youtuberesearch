    const shortNumber = (n) => { const x = Number(n || 0); if (!x) return "-"; if (x >= 1_000_000_000) return (x / 1_000_000_000).toFixed(1) + "B"; if (x >= 1_000_000) return (x / 1_000_000).toFixed(1) + "M"; if (x >= 1_000) return (x / 1_000).toFixed(1) + "K"; return String(x); };

    function parseISODurationToSeconds(iso) { if (!iso || typeof iso !== "string" || !iso.startsWith("PT")) return 0; let h = 0, m = 0, s = 0, num = ""; for (let i = 2; i < iso.length; i++) { const ch = iso[i]; if (ch >= "0" && ch <= "9") { num += ch; continue; } if (ch === "H") { h = parseInt(num || "0", 10); num = ""; } else if (ch === "M") { m = parseInt(num || "0", 10); num = ""; } else if (ch === "S") { s = parseInt(num || "0", 10); num = ""; } } return h * 3600 + m * 60 + s; }

    let geminiKeyIndex = -1;
    async function fetchYT(base, params) { const keys = loadKeys(); if (!keys.length) throw new Error("API 키를 먼저 저장하세요."); const tries = Math.max(3, keys.length); const start = (keyIndex + 1 + keys.length) % keys.length; let last = ""; for (let i = 0; i < tries; i++) { const k = keys[(start + i) % keys.length]; const url = new URL(base); Object.entries(params || {}).forEach(([p, v]) => { if (v !== undefined && v !== null && v !== "") { url.searchParams.set(p, String(v)); } }); url.searchParams.set("key", k); try { const r = await fetch(url); if (r.ok) { keyIndex = (start + i) % keys.length; return r.json(); } last = await r.text(); } catch (e) { last = e?.message || String(e); } await new Promise((r) => setTimeout(r, 150 * (i + 1))); } throw new Error("YT_FAILED: " + String(last).slice(0, 200)); }
    async function ytSearch(opts) { return fetchYT("https://www.googleapis.com/youtube/v3/search", { part: "snippet", ...opts, }); }

    async function ytChannels(ids) { if (!ids?.length) return { items: [] }; return fetchYT("https://www.googleapis.com/youtube/v3/channels", { part: "snippet,statistics,contentDetails", id: ids.join(","), }); }
    async function ytMostPopular({ regionCode, maxResults = 50 }) { return fetchYT("https://www.googleapis.com/youtube/v3/videos", { part: "snippet,contentDetails,statistics,status", chart: "mostPopular", regionCode, maxResults, }); }
    function parseChannelInput(str) { if (!str) return { channelId: "", handle: "" }; try { const u = new URL(str); const parts = u.pathname.split("/").filter(Boolean); const idx = parts.indexOf("channel"); if (idx >= 0 && parts[idx + 1]) { return { channelId: parts[idx + 1], handle: "" }; } const at = parts.find((p) => p.startsWith("@")); if (at) return { channelId: "", handle: at.replace("@", "") }; } catch (e) { if (str.startsWith("UC")) return { channelId: str, handle: "" }; } if (str.startsWith("@")) return { channelId: "", handle: str.slice(1) }; return { channelId: "", handle: str }; }
    async function resolveChannelByHandle(handle) { try { const res = await fetchYT("https://www.googleapis.com/youtube/v3/channels", { part: "id", forHandle: handle }); if (res.items?.length) return res.items[0].id; } catch (e) { } const res2 = await ytSearch({ q: handle, type: "channel", maxResults: 1, }); return res2.items?.[0]?.snippet?.channelId || ""; }
    async function fetchChannelVideosAll(channelId) { const ch = await ytChannels([channelId]); const chInfo = ch.items?.[0]; if (!chInfo) throw new Error("채널 정보를 가져오지 못했습니다."); const uploads = chInfo.contentDetails?.relatedPlaylists?.uploads; let videos = []; if (uploads) { let token = ""; while (true) { const r = await fetchYT("https://www.googleapis.com/youtube/v3/playlistItems", { part: "snippet,contentDetails", playlistId: uploads, maxResults: 50, pageToken: token || undefined, }); (r.items || []).forEach((it) => { videos.push({ videoId: it.contentDetails?.videoId, title: it.snippet?.title, publishedAt: it.contentDetails?.videoPublishedAt || it.snippet?.publishedAt, thumbnail: it.snippet?.thumbnails?.medium?.url || it.snippet?.thumbnails?.default?.url || "", description: it.snippet?.description || "", }); }); if (!r.nextPageToken) break; token = r.nextPageToken; } } else { let token = ""; while (true) { const sres = await ytSearch({ channelId, part: "snippet", order: "date", type: "video", maxResults: 50, pageToken: token || undefined, }); (sres.items || []).forEach((it) => { if (it.id?.videoId) { videos.push({ videoId: it.id.videoId, title: it.snippet?.title, publishedAt: it.snippet?.publishedAt, thumbnail: it.snippet?.thumbnails?.medium?.url || it.snippet?.thumbnails?.default?.url || "", description: it.snippet?.description || "", }); } }); if (!sres.nextPageToken) break; token = sres.nextPageToken; } } const withStats = []; for (let i = 0; i < videos.length; i += 50) { const part = videos.slice(i, i + 50); const ids = part.map((v) => v.videoId); const st = await ytVideos(ids); const stMap = {}; (st.items || []).forEach((v) => { stMap[v.id] = { statistics: v.statistics, durationSec: parseISODurationToSeconds(v.contentDetails?.duration || ""), description: v.snippet?.description || "", license: v.status?.license || "", }; }); part.forEach((v) => { const extra = stMap[v.videoId] || { statistics: {}, durationSec: 0, description: v.description || "", license: "", }; withStats.push({ ...v, statistics: extra.statistics || {}, durationSec: extra.durationSec || 0, description: extra.description || v.description || "", license: extra.license || "", }); }); } return { channelInfo: chInfo, videos: withStats }; }
    async function fetchCaptions(videoId) { try { const res = await fetch("/transcript?video=" + encodeURIComponent(videoId)); const data = await res.json(); if (!res.ok) { return "자막을 가져오지 못했습니다: " + (data.error || res.statusText); } if (!data.lines || !data.lines.length) { return "이 영상에서는 자막을 찾지 못했습니다."; } return data.lines.join("\n"); } catch (e) { return "자막 로딩 중 오류: " + (e.message || e); } }
    async function fetchVideoComments(videoId, maxResults = 10) { const data = await fetchYT("https://www.googleapis.com/youtube/v3/commentThreads", { part: "snippet", videoId, maxResults, }); return (data.items || []).map((it) => { const top = it.snippet.topLevelComment.snippet; return { author: top.authorDisplayName, text: top.textDisplay, publishedAt: top.publishedAt, likeCount: top.likeCount, }; }); }
    async function fetchImageAsBase64(url) { try { const res = await fetch(url); const blob = await res.blob(); const dataUrl = await new Promise((resolve, reject) => { const fr = new FileReader(); fr.onload = () => resolve(fr.result); fr.onerror = reject; fr.readAsDataURL(blob); }); const m = String(dataUrl).match(/^data:(image\/(png|jpeg|jpg));base64,(.+)$/); if (!m) return null; const meta = m[1]; const ext = meta.indexOf("png") > -1 ? "png" : "jpeg"; return { base64: "data:" + meta + ";base64," + m[3], ext }; } catch { return null; } }
    async function callGeminiAPI(prompt, contentText) { const keys = loadGeminiKeys(); if (!keys.length) { throw new Error("Gemini API 키가 없습니다. 먼저 저장하세요."); } const maxLen = 12000; const textToSend = contentText.length > maxLen ? contentText.slice(0, maxLen) + "\n\n...(이하 생략됨)" : contentText; const mergedText = `${prompt}\n\n${textToSend}`; const tries = Math.max(3, keys.length); const start = (geminiKeyIndex + 1 + keys.length) % keys.length; let lastErr = ""; for (let i = 0; i < tries; i++) { const k = keys[(start + i) % keys.length]; const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + encodeURIComponent(k); const body = { contents: [{ role: "user", parts: [{ text: mergedText, },], },], }; try { const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body), }); const data = await res.json(); if (res.ok && data?.candidates?.[0]?.content?.parts?.length) { geminiKeyIndex = (start + i) % keys.length; return data.candidates[0].content.parts.map((p) => p.text).join("\n"); } else { lastErr = data?.error?.message || JSON.stringify(data).slice(0, 200); } } catch (e) { lastErr = e?.message || String(e); } } throw new Error("Gemini 호출 실패: " + lastErr); }

      const handleDownload = async () => {
        const urls = downloadUrls.split('\n').map(u => u.trim()).filter(Boolean);
        if (urls.length === 0) {
          alert("다운로드할 URL을 입력하세요.");
          return;
        }

        setDownloadLoading(true);
        const initialLogs = urls.map(url => ({
          url,
          status: 'pending',
          message: '대기 중...',
          percent: 0,
        }));
        setDownloadLogs(initialLogs);

        for (let i = 0; i < urls.length; i++) {
          const url = urls[i];

          setDownloadLogs(prev => prev.map(log => log.url === url ? { ...log, status: 'progress', message: '서버에 연결 중...' } : log));

          try {
            const response = await fetch("/download", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ url, mode: downloadMode }),
            });

            if (!response.ok) {
              const errData = await response.json();
              throw new Error(errData.error || `서버 오류: ${response.status}`);
            }
            if (!response.body) {
              throw new Error("스트리밍 응답을 지원하지 않습니다.");
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
              const { value, done } = await reader.read();
              if (done) break;

              const chunk = decoder.decode(value, { stream: true });
              const lines = chunk.split('\n\n').filter(Boolean);
              for (const line of lines) {
                if (line.startsWith('data:')) {
                  const jsonData = line.substring(5);
                    try {
                      const parsedData = JSON.parse(jsonData);
                      setDownloadLogs(prev => prev.map(log =>
                        log.url === url ? { ...log, ...parsedData, url } : log
                      ));
                      
                      // 다운로드 성공 시 사용자 PC로 자동 다운로드 트리거
                      if (parsedData.status === 'ok' && parsedData.filename) {

          const order = (videoFilters.sort && ["relevance", "viewCount", "date"].includes(videoFilters.sort)) ? videoFilters.sort : "relevance";
          const subMin = Number(videoFilters.subMin || 0);
          const viewMin = Number(videoFilters.viewMin || 0);
          const lengthType = videoFilters.lengthType || "any";
          const hasFilters = viewMin > 0 || subMin > 0 || chAfter || lengthType !== "any";
          let collected = [];
          const collectedIds = new Set();
          const maxSearchPages = Math.ceil((hasFilters ? Math.max(want * 5, 500) : want) / 50) + 5;
          let token = "";

          while (collectedIds.size < want && searchCount < maxSearchPages) {

            if (order !== "relevance") params.order = order;

            if (lengthType === "long") params.videoDuration = "long";
            if (videoFilters.license !== "any") params.videoLicense = videoFilters.license;

            const ids = (res.items || []).map(x => x.id?.videoId).filter(id => id && !collectedIds.has(id));
            if (!ids.length) break;
            const vRes = await ytVideos(ids);
            const items = (vRes.items || []).filter(v => v.id);

              collected.push(v);
              collectedIds.add(v.id);
            }
            token = res.nextPageToken;
            if (!token) break;

            const subs = Number(ch?.statistics?.subscriberCount || 0);
            const pubMs = new Date(v.snippet.publishedAt).getTime();

              type: "video", id: v.id, url: `https://www.youtube.com/watch?v=${v.id}`, 
              channelId: v.snippet.channelId, thumb: bestThumb(v.snippet.thumbnails),

              dailyViews: views / days, description: v.snippet.description, license: v.status?.license || ""

-[11px] text-slate-500 mb-1"><span className="font-medium">{c.author}</span><span>{c.publishedAt ? c.publishedAt.slice(0, 10) : ""}</span></div><div className="text-[12px]" dangerouslySetInnerHTML={{ __html: c.text, }} />{typeof c.likeCount === "number" && (<div className="mt-1 text-[11px] text-slate-500">좋아요 {c.likeCount}</div>)}</div>))}</div></div><div className="flex-1 flex flex-col border rounded-xl overflow-hidden"><div className="px-3 py-2 border-b bg-slate-50 text-xs font-medium text-slate-700">댓글 분석 결과 (Gemini)</div><div className="flex-1 overflow-auto p-3 text-xs whitespace-pre-wrap scrollbar-thin">{commentAnalysisLoading ? "분석 중입니다..." : commentAnalysis || "아직 분석 결과가 없습니다."}</div></div></div></div></div>)}
          {showDescModal && (<div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50"><div className="bg-white rounded-2xl shadow-xl w-full max-w-3xl max-h-[80vh] flex flex-col"><div className="flex items-center justify-between px-4 py-3 border-b"><h2 className="text-base font-semibold">{descTitle || "설명"}</h2><button onClick={() => setShowDescModal(false)} className="text-sm text-slate-500 hover:text-slate-700">닫기</button></div><div className="flex-1 overflow-auto p-4 text-sm whitespace-pre-wrap scrollbar-thin">{descContent}</div></div></div>)}
          {showFolderSelectModal && (
            <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[60]">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-5 animate-in fade-in zoom-in duration-200">
                <h2 className="text-lg font-semibold mb-3">저장할 폴더 선택</h2>
                <div className="space-y-2 max-h-60 overflow-y-auto mb-4 border rounded-lg p-2">
                  <button onClick={() => performActualSave("all")} className="w-full text-left px-3 py-2 text-sm hover:bg-slate-100 rounded-lg">기본 폴더</button>
                  {loadSavedFolders().map(f => (
                    <button key={f.id} onClick={() => performActualSave(f.id)} className="w-full text-left px-3 py-2 text-sm hover:bg-slate-100 rounded-lg">{f.name}</button>
                  ))}
                </div>
                <div className="flex gap-2">
                  <button onClick={() => {
                    const name = prompt("새 폴더 이름을 입력하세요.");
                    if (name) {
                      const folders = loadSavedFolders();
                      const newFolder = { id: Date.now().toString(), name };
                      saveFolders([...folders, newFolder]);
                      setSavedModalRefresh(prev => prev + 1);
                    }
                  }} className="flex-1 px-3 py-1.5 text-sm rounded-lg border">새 폴더 생성</button>
                  <button onClick={() => setShowFolderSelectModal(false)} className="px-3 py-1.5 text-sm rounded-lg border">취소</button>
                </div>
              </div>
            </div>
          )}
          {showSavedModal && (<div key={savedModalRefresh} className="fixed inset-0 bg-black/40 flex items-center justify-center z-50"><div className="bg-white rounded-2xl shadow-xl w-full max-w-6xl max-h-[90vh] flex flex-col"><div className="flex items-center justify-between px-4 py-3 border-b"><h2 className="text-base font-semibold">저장된 항목</h2><div className="flex gap-2"><button onClick={() => { setSavedModalType("channel"); setSelectedFolderId("all"); setSelectedSavedRows(new Set()); }} className={`px-3 py-1.5 rounded-lg text-sm ${savedModalType === "channel" ? "bg-sky-600 text-white" : "border"}`}>채널</button><button onClick={() => { setSavedModalType("video"); setSelectedFolderId("all"); setSelectedSavedRows(new Set()); }} className={`px-3 py-1.5 rounded-lg text-sm ${savedModalType === "video" ? "bg-sky-600 text-white" : "border"}`}>영상</button></div><div className="flex items-center gap-2"><button onClick={() => {
            const allItems = savedModalType === "channel" ? loadSavedChannels() : loadSavedVideos();
            const filtered = selectedFolderId === "all" ? allItems : (selectedFolderId === "none" ? allItems.filter(item => !item.folderId || item.folderId === "all") : allItems.filter(item => item.folderId === selectedFolderId));
            if (savedModalType === "channel") { exportExcel("saved-channel", filtered); } else { exportExcel("saved-video", filtered); }
          }} className="px-3 py-1.5 rounded-lg bg-emerald-500 text-white text-sm">엑셀 다운로드</button><button onClick={() => { setShowSavedModal(false); setSelectedSavedRows(new Set()); setTab("video"); }} className="text-sm text-slate-500 hover:text-slate-700 ml-2">닫기</button></div></div>
            <div className="flex-1 flex overflow-hidden">
              <div className="w-48 border-r bg-slate-50 p-3 space-y-2 overflow-y-auto">
                <div className="text-xs font-bold text-slate-500 mb-2 px-2">필터</div>
                <button onClick={() => { setSelectedFolderId("all"); setSelectedSavedRows(new Set()); }} className={`w-full text-left px-3 py-1.5 text-sm rounded-lg ${selectedFolderId === "all" ? "bg-sky-100 text-sky-700 font-semibold" : "hover:bg-slate-200"}`}>전체보기</button>
                <button onClick={() => { setSelectedFolderId("none"); setSelectedSavedRows(new Set()); }} className={`w-full text-left px-3 py-1.5 text-sm rounded-lg ${selectedFolderId === "none" ? "bg-sky-100 text-sky-700 font-semibold" : "hover:bg-slate-200"}`}>미분류 항목</button>
                <div className="h-px bg-slate-200 my-1"></div>
                <div className="text-xs font-bold text-slate-500 mb-2 px-2">폴더 목록</div>
                {loadSavedFolders().map(f => (
                  <div key={f.id} className="group flex items-center justify-between">
                    <button onClick={() => { setSelectedFolderId(f.id); setSelectedSavedRows(new Set()); }} className={`flex-1 text-left px-3 py-1.5 text-sm rounded-lg truncate ${selectedFolderId === f.id ? "bg-sky-100 text-sky-700 font-semibold" : "hover:bg-slate-200"}`}>{f.name}</button>
                    <button onClick={(e) => {
                      e.stopPropagation();
                      if (confirm("이 폴더를 삭제할까요? 폴더 안의 항목들은 '전체보기'로 이동됩니다.")) {
                        const folders = loadSavedFolders();
                        saveFolders(folders.filter(x => x.id !== f.id));
                        setSelectedFolderId("all");
                      }
                    }} className="hidden group-hover:block px-1 text-red-500 text-xs">삭제</button>
                  </div>
                ))}
                <button onClick={() => {
                  const name = prompt("새 폴더 이름을 입력하세요.");
                  if (name) {
                    const folders = loadSavedFolders();
                    saveFolders([...folders, { id: Date.now().toString(), name }]);
                    setSavedModalRefresh(prev => prev + 1);
                  }
                }} className="w-full text-left px-3 py-1.5 text-sm text-sky-600 hover:bg-sky-50 rounded-lg font-medium">+ 폴더 생성</button>
              </div>
              <div className="flex-1 overflow-auto p-4 flex flex-col">
                <div className="mb-3 flex items-center justify-between">
                  <div className="flex gap-2">
                    {selectedSavedRows.size > 0 && (
                      <button onClick={() => {
                        const allItems = savedModalType === "channel" ? loadSavedChannels() : loadSavedVideos();
                        const selected = allItems.filter(item => selectedSavedRows.has(item.id));
                        setTargetItemsToSave(selected);
                        setTargetSaveType(savedModalType);
                        setShowFolderSelectModal(true);
                      }} className="px-3 py-1.5 rounded-lg bg-sky-600 text-white text-sm">선택 항목 폴더 이동 ({selectedSavedRows.size})</button>
                    )}
                  </div>
                  <div className="text-xs text-slate-400">
                    {selectedSavedRows.size > 0 ? `${selectedSavedRows.size}개 선택됨` : ""}
                  </div>
                </div>
                <div className="bg-white border rounded-xl overflow-hidden flex-1 overflow-auto">
                  <div className="overflow-auto max-h-full">
                    <table className="min-w-full text-sm table-fixed">
                      <thead className="bg-slate-100 sticky top-0 z-10">{savedModalType === "channel" ? (() => {
                        const savedChannels = loadSavedChannels();
                        const filtered = selectedFolderId === "all" ? savedChannels : (selectedFolderId === "none" ? savedChannels.filter(c => !c.folderId || c.folderId === "all") : savedChannels.filter(c => c.folderId === selectedFolderId));
                        return (<tr> <th className="px-2 py-2 text-center w-10"><input type="checkbox" checked={selectedSavedRows.size === filtered.length && filtered.length > 0} onChange={() => handleSelectAllSaved(filtered)} /></th> <th className="px-2 py-2 text-center w-40">프로필</th> <th className="px-2 py-2 text-center w-56">채널명</th> <th className="px-2 py-2 text-center w-28">구독자수</th> <th className="px-2 py-2 text-left w-28">채널개설일</th> <th className="px-2 py-2 text-center w-72">채널설명</th> <th className="px-2 py-2 text-center w-32">폴더</th> <th className="px-2 py-2 text-center w-24">이동</th> <th className="px-2 py-2 text-center w-20">삭제</th> </tr>);
                      })() : (() => {
                        const savedVideos = loadSavedVideos();
                        const filtered = selectedFolderId === "all" ? savedVideos : (selectedFolderId === "none" ? savedVideos.filter(v => !v.folderId || v.folderId === "all") : savedVideos.filter(v => v.folderId === selectedFolderId));
                        return (<tr> <th className="px-2 py-2 text-center w-10"><input type="checkbox" checked={selectedSavedRows.size === filtered.length && filtered.length > 0} onChange={() => handleSelectAllSaved(filtered)} /></th> <th className="px-2 py-2 text-center w-60">썸네일</th> <th className="px-2 py-2 text-center w-48">제목</th> <th className="px-2 py-2 text-center w-36">채널</th> <th className="px-2 py-2 text-center w-24">조회수</th> <th className="px-2 py-2 text-center w-20">길이(초)</th> <th className="px-2 py-2 text-center w-24">게시일</th> <th className="px-2 py-2 text-center w-32">폴더</th> <th className="px-2 py-2 text-center w-24">이동</th> <th className="px-2 py-2 text-center w-20">삭제</th> </tr>);
                      })()}</thead>
                      <tbody>{savedModalType === "channel" ? (() => {
                        const savedChannels = loadSavedChannels();
                        const foldersMap = Object.fromEntries(loadSavedFolders().map(f => [f.id, f.name]));
                        const filtered = selectedFolderId === "all" ? savedChannels : (selectedFolderId === "none" ? savedChannels.filter(c => !c.folderId || c.folderId === "all") : savedChannels.filter(c => c.folderId === selectedFolderId));
                        return filtered.length === 0 ? (<tr><td colSpan="9" className="text-center py-10 text-slate-400">항목이 없습니다.</td></tr>) : filtered.map((c) => (<tr key={c.id} className="border-b last:border-0 hover:bg-slate-50"> <td className="px-2 py-2 text-center"><input type="checkbox" checked={selectedSavedRows.has(c.id)} onChange={() => handleToggleSavedRow(c.id)} /></td> <td className="px-2 py-2">{c.profileThumb ? <img src={c.profileThumb} alt="" className="w-40 h-40 object-cover rounded" /> : "-"}</td> <td className="px-2 py-2"><a href={`https://www.youtube.com/channel/${c.id}`} target="_blank" rel="noreferrer" className="text-slate-900 hover:text-sky-600 font-medium">{c.channelTitle}</a></td> <td className="px-2 py-2 text-center">{shortNumber(c.subscriberCount)}</td> <td className="px-2 py-2">{(c.channelPublishedAt || "").slice(0, 10)}</td> <td className="px-2 py-2 text-slate-600"><button type="button" onClick={() => openDescriptionModal(c.description || "", c.channelTitle)} className="text-left w-full"><div className="line-clamp-2 max-w-[360px]">{c.description || ""}</div></button></td> <td className="px-2 py-2 text-center text-[11px] text-slate-500 font-medium">{foldersMap[c.folderId] || "미분류"}</td>
                          <td className="px-2 py-2 text-center"><button onClick={() => {
                            setTargetItemsToSave([c]);
                            setTargetSaveType("channel");
                            setShowFolderSelectModal(true);
                          }} className="text-xs text-sky-600 hover:underline">폴더변경</button></td>
                          <td className="px-2 py-2 text-center"><button onClick={() => { handleDeleteSavedChannel(c.id); }} className="px-2 py-1 text-xs rounded-lg bg-red-500 text-white hover:bg-red-600">삭제</button></td> </tr>));
                      })() : (() => {
                        const savedVideos = loadSavedVideos();
                        const foldersMap = Object.fromEntries(loadSavedFolders().map(f => [f.id, f.name]));
                        const filtered = selectedFolderId === "all" ? savedVideos : (selectedFolderId === "none" ? savedVideos.filter(v => !v.folderId || v.folderId === "all") : savedVideos.filter(v => v.folderId === selectedFolderId));
                        return filtered.length === 0 ? (<tr><td colSpan="10" className="text-center py-10 text-slate-400">항목이 없습니다.</td></tr>) : filtered.map((v) => (<tr key={v.id} className="border-b last:border-0 hover:bg-slate-50"> <td className="px-2 py-2 text-center"><input type="checkbox" checked={selectedSavedRows.has(v.id)} onChange={() => handleToggleSavedRow(v.id)} /></td> <td className="px-2 py-2">{v.thumb ? <div className="w-[200px] aspect-video bg-slate-100 rounded overflow-hidden"><img src={v.thumb} alt="" className="w-full h-full object-cover" /></div> : "-"}</td> <td className="px-2 py-2"><a href={v.url} target="_blank" rel="noreferrer" className="text-slate-900 hover:text-sky-600 font-medium line-clamp-2 max-w-[180px]">{v.title}</a></td> <td className="px-2 py-2"><a href={v.channelId ? `https://www.youtube.com/channel/${v.channelId}` : "#"} target="_blank" rel="noreferrer" className="text-slate-700 hover:text-sky-600 truncate max-w-[140px]">{v.channelTitle}</a></td> <td className="px-2 py-2 text-center">{shortNumber(v.viewCount)}</td> <td className="px-2 py-2 text-center">{v.durationSec || "-"}</td> <td className="px-2 py-2">{(v.publishedAt || "").slice(0, 10)}</td> <td className="px-2 py-2 text-center text-[11px] text-slate-500 font-medium">{foldersMap[v.folderId] || "미분류"}</td>
                          <td className="px-2 py-2 text-center"><button onClick={() => {
                            setTargetItemsToSave([v]);
                            setTargetSaveType("video");
                            setShowFolderSelectModal(true);
                          }} className="text-xs text-sky-600 hover:underline">폴더변경</button></td>
                          <td className="px-2 py-2 text-center"><button onClick={() => { handleDeleteSavedVideo(v.id); }} className="px-2 py-1 text-xs rounded-lg bg-red-500 text-white hover:bg-red-600">삭제</button></td> </tr>));
                      })()}</tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div></div>)}

          {/* 커피 후원 모달 */}
          {showCoffeeModal && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4" onClick={() => setShowCoffeeModal(false)}>
              <div className="bg-white rounded-3xl shadow-2xl overflow-hidden max-w-sm w-full animate-in fade-in zoom-in duration-300" onClick={e => e.stopPropagation()}>
                <div className="relative">
                  <img src="https://store.img11.co.kr/70064898/e9459abf-7937-4289-b479-f8cb197cb71b_1772709289557.png" alt="Coffee Support" className="w-full h-auto" />
                  <button onClick={() => setShowCoffeeModal(false)} className="absolute top-4 right-4 w-10 h-10 bg-white/80 backdrop-blur rounded-full flex items-center justify-center text-slate-800 hover:bg-white transition-all shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                    </svg>
                  </button>
                </div>
                <div className="p-6 text-center">
                  <h3 className="text-xl font-bold text-slate-800 mb-2">커피 한 잔의 응원 🥤</h3>
                  <p className="text-slate-600 text-sm leading-relaxed">
                    더 나은 프로그램 개발을 위해 큰 힘이 됩니다!<br />항상 이용해주셔서 감사합니다.
                  </p>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>

</html>
